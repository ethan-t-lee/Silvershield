<!DOCTYPE html>
<html lang="{{ get_locale() }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ _("Silvershield Login") }}</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='loginStyle.css') }}">
</head>

<body>

<div class="login-container">

<!-- Left side - Login form -->

<div class="login-left">

<div class="login-form-wrapper">

<form class="login-form" method="POST" onsubmit="return false;">

<!-- Slide 1 -->

<div class="login-slide slide active" id="login-slide1">

<div class="form-group">

<h1>{{ _("Welcome") }}</h1>

<p>{{ _("Please log in to continue.") }}</p>

<label for="login-username">
{{ _("Email or Username") }}
</label>

<input type="text"
       id="login-username"
       name="username"
       required>

</div>


<div class="form-group">

<label for="login-password">
{{ _("Password") }}
</label>

<input type="password"
       id="login-password"
       name="password"
       required>

</div>


<div class="btn-group">

<button type="button"
        class="btn next-btn login-next">

{{ _("Log In") }}

</button>

</div>


<div class="links">

<a href="#">
{{ _("Forgot password?") }}
</a>

<span> | </span>

<a href="{{ url_for('account_creation') }}">
{{ _("Create account") }}
</a>

</div>

</div>


<!-- Slide 2 - OTP verification -->

<div class="login-slide slide" id="login-slide2">

<div class="form-group">

<h1>{{ _("Verification") }}</h1>

<p>{{ _("Enter OTP sent to your phone:") }}</p>

<input type="text"
       id="login-otp-code"
       placeholder="{{ _('OTP') }}">

<div class="login-otp-error"></div>

<div class="btn-group">

<button type="button"
        class="btn login-verify-otp-btn">

{{ _("Verify OTP") }}

</button>

</div>

</div>

</div>

</form>

</div>
</div>


<!-- Right side background -->

<div class="login-right"></div>

</div>


<script src="{{ url_for('static', filename='auth.js') }}"></script>

</body>
</html>
